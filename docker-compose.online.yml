services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aimed-online-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - aimed-online-knowledge-data:/app/data/knowledge-base
      - ./config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./aimed-ui
      dockerfile: Dockerfile
    container_name: aimed-online-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
volumes:
  aimed-online-knowledge-data:
