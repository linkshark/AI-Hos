services:
  mongodb:
    image: mongo:7
    container_name: aimed-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - aimed-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: aimed-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - aimed-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aimed-mongo-data:
  aimed-redis-data:
