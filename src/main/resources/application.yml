spring:
  application:
    name: aihos
  output:
    ansi:
      enabled: always
  config:
    # 线上配置先加载，本地私有配置后加载；当两者同时存在时，本地覆盖线上。
    import:
      - optional:file:./config/application-online.yml
      - optional:file:./config/application-local.yml
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/chat_memory_db}
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDIS_HOST:127.0.0.1}}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_HOST_PORT:6379}}
      username: ${SPRING_DATA_REDIS_USERNAME:${REDIS_USERNAME:default}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:PT5S}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aimed?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接最大存活时间：5min（必须 < MySQL wait_timeout）
      max-lifetime: 300000
      # 空闲超时（必须 < max-lifetime）3min
      idle-timeout: 180000
      # 最小空闲连接
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 30
      # 获取连接前检测有效性
      test-on-borrow: true
      # 连接有效性检测语句
      connection-test-query: SELECT 1
      # 从连接池获取连接的超时时间 30s
      connection-timeout: 30000
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

app:
  runtime:
    online-config: false
  auth:
    jwt-secret: ${JWT_SECRET:change-me-for-production-change-me-for-production}
    access-expires: ${JWT_ACCESS_EXPIRES:PT30M}
    refresh-expires: ${JWT_REFRESH_EXPIRES:P14D}
    verification-expires: ${JWT_VERIFICATION_EXPIRES:PT10M}
    mail-mock-enabled: ${MAIL_MOCK_ENABLED:true}
    admin-bootstrap-enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:true}
    admin-register-enabled: ${APP_ADMIN_REGISTER_ENABLED:false}
    admin-register-invite-token: ${APP_ADMIN_REGISTER_INVITE_TOKEN:}
    admin-username: ${APP_ADMIN_USERNAME:admin}
    admin-email: ${APP_ADMIN_EMAIL:654735670@qq.com}
    admin-password: ${APP_ADMIN_PASSWORD:change-me-admin-password}
    admin-nickname: ${APP_ADMIN_NICKNAME:树兰管理员}
  web:
    async:
      core-pool-size: ${WEB_ASYNC_CORE_POOL_SIZE:4}
      max-pool-size: ${WEB_ASYNC_MAX_POOL_SIZE:16}
      queue-capacity: ${WEB_ASYNC_QUEUE_CAPACITY:200}
      timeout: ${WEB_ASYNC_TIMEOUT:PT60S}
  security:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  provider:
    default: ${APP_PROVIDER_DEFAULT:LOCAL_OMLX}
    local-enabled: ${APP_PROVIDER_LOCAL_ENABLED:true}
    online-enabled: ${APP_PROVIDER_ONLINE_ENABLED:true}
  embedding:
    provider: ${EMBEDDING_PROVIDER:OLLAMA}
    base-url: ${EMBEDDING_BASE_URL:http://localhost:11434}
    api-key: ${EMBEDDING_API_KEY:${BL_KEY:}}
    model-name: ${EMBEDDING_MODEL_NAME:bge-m3:latest}
    request-model-name: ${EMBEDDING_REQUEST_MODEL_NAME:${EMBEDDING_MODEL_NAME:bge-m3:latest}}
    timeout: ${EMBEDDING_TIMEOUT:PT90S}
    max-attempts: ${EMBEDDING_MAX_ATTEMPTS:3}
    retry-delay: ${EMBEDDING_RETRY_DELAY:PT2S}
    batch-size: ${EMBEDDING_BATCH_SIZE:24}
    log-requests: ${EMBEDDING_LOG_REQUESTS:false}
    log-responses: ${EMBEDDING_LOG_RESPONSES:false}
  local-chat:
    # OMLX 按 OpenAI-compatible 协议接入；如需临时回退 Ollama，设置 LOCAL_CHAT_PLATFORM=OLLAMA 且改回 11434。
    platform: ${LOCAL_CHAT_PLATFORM:OMLX}
    base-url: ${LOCAL_CHAT_BASE_URL:http://localhost:8000/v1}
    api-key: ${LOCAL_CHAT_API_KEY:}
    model-name: ${LOCAL_CHAT_MODEL_NAME:Qwen3.6-35B-A3B-4bit}
    max-history-messages: ${LOCAL_CHAT_MAX_HISTORY_MESSAGES:4}
    temperature: ${LOCAL_CHAT_TEMPERATURE:0.2}
    num-predict: ${LOCAL_CHAT_NUM_PREDICT:384}
    num-ctx: ${LOCAL_CHAT_NUM_CTX:4096}
    timeout: ${LOCAL_CHAT_TIMEOUT:PT180S}
    log-requests: ${LOCAL_CHAT_LOG_REQUESTS:false}
    log-responses: ${LOCAL_CHAT_LOG_RESPONSES:false}
  online-chat:
    base-url: ${ONLINE_CHAT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${ONLINE_CHAT_API_KEY:${BL_KEY:}}
    fast:
      model-name: ${ONLINE_CHAT_FAST_MODEL_NAME:qwen3.6-flash}
      max-history-messages: ${ONLINE_CHAT_FAST_MAX_HISTORY_MESSAGES:8}
    deep:
      model-name: ${ONLINE_CHAT_MODEL_NAME:qwen3.6-plus}
      max-history-messages: ${ONLINE_CHAT_DEEP_MAX_HISTORY_MESSAGES:12}
    temperature: ${ONLINE_CHAT_TEMPERATURE:0.9}
    timeout: ${ONLINE_CHAT_TIMEOUT:PT90S}
    log-requests: ${ONLINE_CHAT_LOG_REQUESTS:false}
    log-responses: ${ONLINE_CHAT_LOG_RESPONSES:false}
  vision-chat:
    base-url: ${VISION_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${VISION_API_KEY:${BL_KEY:}}
    model-name: ${VISION_MODEL_NAME:qwen3.6-plus}
    timeout: ${VISION_TIMEOUT:PT90S}
  local-vision:
    base-url: ${LOCAL_VISION_BASE_URL:http://localhost:8000/v1}
    api-key: ${LOCAL_VISION_API_KEY:${LOCAL_CHAT_API_KEY:}}
    model-name: ${LOCAL_VISION_MODEL_NAME:${LOCAL_CHAT_MODEL_NAME:Qwen3.6-35B-A3B-4bit}}
    temperature: ${LOCAL_VISION_TEMPERATURE:0.2}
    max-tokens: ${LOCAL_VISION_MAX_TOKENS:512}
    timeout: ${LOCAL_VISION_TIMEOUT:PT180S}
    log-requests: ${LOCAL_VISION_LOG_REQUESTS:false}
    log-responses: ${LOCAL_VISION_LOG_RESPONSES:false}
  knowledge-base:
    storage-dir: ${KNOWLEDGE_BASE_STORAGE_DIR:data/knowledge-base}
    bootstrap-enabled: ${KNOWLEDGE_BASE_BOOTSTRAP_ENABLED:true}
    embedding-build-enabled: ${KNOWLEDGE_BASE_EMBEDDING_BUILD_ENABLED:true}
    segmentation-mode: ${KNOWLEDGE_SEGMENTATION_MODE:STRUCTURED}
    semantic-enrichment:
      enabled: ${KNOWLEDGE_SEMANTIC_ENRICHMENT_ENABLED:true}
      max-input-chars: ${KNOWLEDGE_SEMANTIC_ENRICHMENT_MAX_INPUT_CHARS:1400}
      max-keywords: ${KNOWLEDGE_SEMANTIC_ENRICHMENT_MAX_KEYWORDS:8}
      model-name: ${KNOWLEDGE_SEMANTIC_ENRICHMENT_MODEL_NAME:${LOCAL_CHAT_MODEL_NAME:Qwen3.6-35B-A3B-4bit}}
    chunk-size: ${KNOWLEDGE_CHUNK_SIZE:1000}
    chunk-overlap: ${KNOWLEDGE_CHUNK_OVERLAP:150}
    max-chunk-size: ${KNOWLEDGE_MAX_CHUNK_SIZE:4000}
    max-segments-per-document: ${KNOWLEDGE_MAX_SEGMENTS_PER_DOCUMENT:1200}
    guide-target-chars: ${KNOWLEDGE_GUIDE_TARGET_CHARS:900}
    guide-max-chars: ${KNOWLEDGE_GUIDE_MAX_CHARS:1400}
    general-target-chars: ${KNOWLEDGE_GENERAL_TARGET_CHARS:900}
    general-max-chars: ${KNOWLEDGE_GENERAL_MAX_CHARS:1400}
    min-merge-chars: ${KNOWLEDGE_MIN_MERGE_CHARS:180}
    max-structure-sections: ${KNOWLEDGE_MAX_STRUCTURE_SECTIONS:240}
    sentence-fallback-overlap-chars: ${KNOWLEDGE_SENTENCE_FALLBACK_OVERLAP_CHARS:80}
    search:
      fast-mode: ${KNOWLEDGE_SEARCH_FAST_MODE:true}
      enable-content-like-fallback: ${KNOWLEDGE_SEARCH_ENABLE_CONTENT_LIKE_FALLBACK:false}
      enable-medical-standard-realtime: ${KNOWLEDGE_SEARCH_ENABLE_MEDICAL_STANDARD_REALTIME:true}
      vector-timeout-ms: ${KNOWLEDGE_SEARCH_VECTOR_TIMEOUT_MS:1500}
      embedding-cache-ttl-ms: ${KNOWLEDGE_SEARCH_EMBEDDING_CACHE_TTL_MS:300000}
      keyword-top-k: ${KNOWLEDGE_SEARCH_KEYWORD_TOP_K:8}
      vector-top-k: ${KNOWLEDGE_SEARCH_VECTOR_TOP_K:8}
      final-top-k: ${KNOWLEDGE_SEARCH_FINAL_TOP_K:6}
      vector-min-score: ${KNOWLEDGE_SEARCH_VECTOR_MIN_SCORE:0.35}
      async:
        core-pool-size: ${KNOWLEDGE_SEARCH_ASYNC_CORE_POOL_SIZE:2}
        max-pool-size: ${KNOWLEDGE_SEARCH_ASYNC_MAX_POOL_SIZE:2}
        queue-capacity: ${KNOWLEDGE_SEARCH_ASYNC_QUEUE_CAPACITY:32}
      local:
        final-top-k: ${KNOWLEDGE_SEARCH_LOCAL_FINAL_TOP_K:3}
    async:
      core-pool-size: ${KNOWLEDGE_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${KNOWLEDGE_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${KNOWLEDGE_ASYNC_QUEUE_CAPACITY:64}
  rag:
    query-rewrite:
      enabled: ${RAG_QUERY_REWRITE_ENABLED:true}
      history-user-window: ${RAG_QUERY_REWRITE_HISTORY_USER_WINDOW:4}
      mode: ${RAG_QUERY_REWRITE_MODE:RULE_ONLY}
      model:
        enabled: ${RAG_QUERY_REWRITE_MODEL_ENABLED:false}
        mode: ${RAG_QUERY_REWRITE_MODEL_MODE:DIAGNOSTIC_ONLY}
        platform: ${RAG_QUERY_REWRITE_MODEL_PLATFORM:ONLINE_FAST}
        base-url: ${RAG_QUERY_REWRITE_MODEL_BASE_URL:${ONLINE_CHAT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
        api-key: ${RAG_QUERY_REWRITE_MODEL_API_KEY:${ONLINE_CHAT_API_KEY:${BL_KEY:}}}
        model-name: ${RAG_QUERY_REWRITE_MODEL_NAME:${ONLINE_CHAT_FAST_MODEL_NAME:qwen3.6-flash}}
        temperature: ${RAG_QUERY_REWRITE_MODEL_TEMPERATURE:0.1}
        max-tokens: ${RAG_QUERY_REWRITE_MODEL_MAX_TOKENS:128}
        timeout: ${RAG_QUERY_REWRITE_MODEL_TIMEOUT:PT3S}
        log-requests: ${RAG_QUERY_REWRITE_MODEL_LOG_REQUESTS:false}
        log-responses: ${RAG_QUERY_REWRITE_MODEL_LOG_RESPONSES:false}

mybatis-plus:
  configuration:
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  file:
    name: ${LOG_FILE_NAME:}
  level:
    root: info
    com.linkjb.aimed: info
    org.springframework.jdbc.core.JdbcTemplate: ${JDBC_TEMPLATE_LOG_LEVEL:INFO}
