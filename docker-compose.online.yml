services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aimed-online-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      JWT_SECRET: c1b3b95b488458ee402b7e73dd726eb69c93efc2bed8946e2bf9460b2482fc8c
      APP_ADMIN_USERNAME: shulan-admin
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/skywalking/agent/skywalking-agent.jar
        -Dskywalking.agent.service_name=aihos
        -Dskywalking.agent.instance_name=aihos-online
        -Dskywalking.collector.backend_service=aimed-skywalking-oap:11800
    volumes:
      # 线上知识文件直接映射到项目目录，确保本地仓库与服务器部署内容保持同步。
      - ./data/knowledge-base:/app/data/knowledge-base
      - ./config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - default
      - aimed-observability
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./aimed-ui
      dockerfile: Dockerfile
    container_name: aimed-online-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
networks:
  aimed-observability:
    external: true
    name: aimed-observability
