# web
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# langchain4j

# 1. gpt-4o-mini
#langchain4j.open-ai.chat-model.base-url=http://langchain4j.dev/demo/openai/v1
#langchain4j.open-ai.chat-model.api-key=demo
#langchain4j.open-ai.chat-model.model-name=gpt-4o-mini

# 2. deepseek
# 2.1 百炼平台（免费额度）
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.api-key=${BL_KEY}
langchain4j.open-ai.chat-model.model-name=qwen-plus
langchain4j.open-ai.chat-model.temperature=0.9

# 2.2 官网（收费）
#langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
#langchain4j.open-ai.chat-model.api-key=${DEEPSEEK_API_KEY}
#langchain4j.open-ai.chat-model.model-name=deepseek-chat

# 3. ollama
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=deepseek-r1:1.5b
langchain4j.ollama.chat-model.temperature=0.8
langchain4j.ollama.chat-model.timeout=PT60S

# 本地主聊天模型（默认）
app.local-chat.base-url=${LOCAL_CHAT_BASE_URL:http://localhost:11434}
app.local-chat.model-name=${LOCAL_CHAT_MODEL_NAME:qwen2.5:3b}
#app.local-chat.model-name=${LOCAL_CHAT_MODEL_NAME:qwen3.5:4b}
app.local-chat.temperature=${LOCAL_CHAT_TEMPERATURE:0.3}
app.local-chat.num-predict=${LOCAL_CHAT_NUM_PREDICT:384}
app.local-chat.num-ctx=${LOCAL_CHAT_NUM_CTX:4096}
app.local-chat.timeout=${LOCAL_CHAT_TIMEOUT:PT90S}
app.local-chat.log-requests=${LOCAL_CHAT_LOG_REQUESTS:false}
app.local-chat.log-responses=${LOCAL_CHAT_LOG_RESPONSES:false}

# 4. 阿里百炼平台
langchain4j.community.dashscope.chat-model.api-key=${BL_KEY}
langchain4j.community.dashscope.chat-model.model-name=qwen-plus

# 应用发给大模型的请求日志和响应日志
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

#MongoDB连接配置
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/chat_memory_db}

# 基本数据源配置
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aimed?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 开启 SQL 日志打印
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# 本地 Ollama embedding 模型
app.embedding.base-url=${EMBEDDING_BASE_URL:http://localhost:11434}
app.embedding.model-name=${EMBEDDING_MODEL_NAME:bge-m3:latest}
app.embedding.timeout=${EMBEDDING_TIMEOUT:PT90S}
app.embedding.max-attempts=${EMBEDDING_MAX_ATTEMPTS:3}
app.embedding.retry-delay=${EMBEDDING_RETRY_DELAY:PT2S}
app.embedding.batch-size=${EMBEDDING_BATCH_SIZE:24}
app.embedding.log-requests=${EMBEDDING_LOG_REQUESTS:false}
app.embedding.log-responses=${EMBEDDING_LOG_RESPONSES:false}

#集成阿里通义千问-流式输出
langchain4j.community.dashscope.streaming-chat-model.api-key=${BL_KEY}
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus

# 百炼视觉模型（用于图片分析/图片+文本对话）
app.vision-chat.base-url=${VISION_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
app.vision-chat.api-key=${VISION_API_KEY:${BL_KEY}}
app.vision-chat.model-name=${VISION_MODEL_NAME:qwen3-vl-plus}
app.vision-chat.timeout=${VISION_TIMEOUT:PT90S}

# 本地 Ollama 视觉模型
app.local-vision.base-url=${LOCAL_VISION_BASE_URL:http://localhost:11434}
app.local-vision.model-name=${LOCAL_VISION_MODEL_NAME:qwen2.5vl:7b}
app.local-vision.temperature=${LOCAL_VISION_TEMPERATURE:0.2}
app.local-vision.num-ctx=${LOCAL_VISION_NUM_CTX:8192}
app.local-vision.timeout=${LOCAL_VISION_TIMEOUT:PT180S}
app.local-vision.log-requests=${LOCAL_VISION_LOG_REQUESTS:false}
app.local-vision.log-responses=${LOCAL_VISION_LOG_RESPONSES:false}

# 设置系统日志级别
logging.level.root=info
logging.level.com.linkjb.aimed=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [trace=%X{traceId:-}] - %msg%n

# 本地知识库配置
app.knowledge-base.storage-dir=${KNOWLEDGE_BASE_STORAGE_DIR:data/knowledge-base}
app.knowledge-base.bootstrap-enabled=${KNOWLEDGE_BASE_BOOTSTRAP_ENABLED:true}
app.knowledge-base.chunk-size=${KNOWLEDGE_CHUNK_SIZE:1000}
app.knowledge-base.chunk-overlap=${KNOWLEDGE_CHUNK_OVERLAP:150}
app.knowledge-base.max-chunk-size=${KNOWLEDGE_MAX_CHUNK_SIZE:4000}
app.knowledge-base.max-segments-per-document=${KNOWLEDGE_MAX_SEGMENTS_PER_DOCUMENT:1200}
app.knowledge-base.async.core-pool-size=${KNOWLEDGE_ASYNC_CORE_POOL_SIZE:1}
app.knowledge-base.async.max-pool-size=${KNOWLEDGE_ASYNC_MAX_POOL_SIZE:1}
app.knowledge-base.async.queue-capacity=${KNOWLEDGE_ASYNC_QUEUE_CAPACITY:32}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
