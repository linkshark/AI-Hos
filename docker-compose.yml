services:
  mongodb:
    image: mongo:7
    container_name: aimed-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - aimed-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aimed-mongo-data:
