services:
  mongodb:
    image: mongo:7
    container_name: aimed-prod-mongo
    restart: unless-stopped
    volumes:
      - aimed-prod-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aimed-prod-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongodb:27017/chat_memory_db}
      KNOWLEDGE_BASE_STORAGE_DIR: /app/data/knowledge-base
      LOCAL_CHAT_BASE_URL: ${LOCAL_CHAT_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_VISION_BASE_URL: ${LOCAL_VISION_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - aimed-prod-knowledge-data:/app/data/knowledge-base
    depends_on:
      mongodb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./aimed-ui
      dockerfile: Dockerfile
    container_name: aimed-prod-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  aimed-prod-mongo-data:
  aimed-prod-knowledge-data:
